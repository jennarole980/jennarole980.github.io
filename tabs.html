<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tabs Demo</title>
    <link rel="stylesheet" href="tabs.css">
</head>
<body>
    <div class="container">
        <h1>Simple Tabs Demo</h1>
        
        <div class="tabs">
            <button class="tab active" data-tab="home">Home</button>
            <button class="tab" data-tab="about">About</button>
            <button class="tab" data-tab="services">Services</button>
            <button class="tab" data-tab="contact">Contact</button>
        </div>

        <div class="tab-content active" id="home">
            <h2>Home</h2>
            <p>Welcome to the home tab. This is a simple demonstration of tabs using JavaScript.</p>
        </div>

        <div class="tab-content" id="about">
            <h2>About</h2>
            <p>This is the about section with minimal content.</p>
        </div>

        <div class="tab-content" id="services">
            <h2>Services</h2>
            <p>Here you would find information about services.</p>
        </div>

        <div class="tab-content" id="contact">
            <h2>Contact</h2>
            <p>Contact information would go here.</p>
        </div>
    </div>

    <script src="tabs.js"></script>
</body>
</html>
